############################################################
# To rename the app, change only these 3 values:
############################################################
name: ColimaDesktop  # Xcode project file name

options:
  bundleIdPrefix: com.colima
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.30"
  createIntermediateGroups: true

packages:
  ViewInspector:
    url: https://github.com/nalexn/ViewInspector
    from: "0.10.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targetTemplates:
  UnitTestBundle:
    type: bundle.unit-test
    platform: macOS
    dependencies:
      - target: ColimaDesktop
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Colima Desktop.app/Contents/MacOS/Colima Desktop"
        BUNDLE_LOADER: "$(TEST_HOST)"

targets:
  # ─── Main App ───────────────────────────────────────────
  ColimaDesktop:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colima.desktop
        INFOPLIST_KEY_CFBundleDisplayName: "Colima Desktop"
        INFOPLIST_KEY_LSApplicationIsAgent: NO
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_NAME: "Colima Desktop"
        PRODUCT_MODULE_NAME: ColimaDesktop
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Defaults for dev builds; release builds override from the git tag
        # (see scripts/version.sh + scripts/package.sh).
        MARKETING_VERSION: "0.0.0"
        CURRENT_PROJECT_VERSION: "1"

  # ─── Unit Tests (Swift Testing) ─────────────────────────
  ColimaDesktopUnitTests:
    templates:
      - UnitTestBundle
    sources:
      - Tests/Unit
      - Tests/Support
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colima.desktop.unit-tests

  # ─── Integration Tests (ViewInspector) ──────────────────
  ColimaDesktopIntegrationTests:
    templates:
      - UnitTestBundle
    sources:
      - Tests/Integration
      - Tests/Support
    dependencies:
      - package: ViewInspector
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colima.desktop.integration-tests

  # ─── Snapshot Tests ─────────────────────────────────────
  ColimaDesktopSnapshotTests:
    templates:
      - UnitTestBundle
    sources:
      - Tests/Snapshot
    dependencies:
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colima.desktop.snapshot-tests

  # ─── UI Tests (XCUITest — run in VM only) ───────────────
  ColimaDesktopUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/UI
    dependencies:
      - target: ColimaDesktop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colima.desktop.ui-tests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: ColimaDesktop
