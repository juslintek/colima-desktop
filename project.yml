############################################################
# To rename the app, change only these 3 values:
############################################################
name: ColimaDesktop  # Xcode project file name

options:
  bundleIdPrefix: com.colima
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.30"
  createIntermediateGroups: true

packages:
  ViewInspector:
    url: https://github.com/nalexn/ViewInspector
    from: "0.10.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targetTemplates:
  UnitTestBundle:
    type: bundle.unit-test
    platform: macOS
    dependencies:
      - target: ColimaDesktopKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true

targets:
  # ─── Shared framework (all app logic + views) ───────────
  # Extracted so logic/integration tests link the module directly
  # (@testable import ColimaDesktopKit) instead of hosting the @main
  # app — this avoids the Xcode-26 "test runner hung before establishing
  # connection" failure. See .kiro/board/DECISIONS.md ADR-004.
  ColimaDesktopKit:
    type: framework
    platform: macOS
    sources:
      - Sources/App
      - Sources/Models
      - Sources/Services
      - Sources/Views
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colima.desktop.kit
        PRODUCT_MODULE_NAME: ColimaDesktopKit
        GENERATE_INFOPLIST_FILE: true
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true

  # ─── Main App (thin @main shell over the framework) ─────
  ColimaDesktop:
    type: application
    platform: macOS
    sources:
      - Sources/Main
      - Sources/Assets.xcassets
    dependencies:
      - target: ColimaDesktopKit
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colima.desktop
        INFOPLIST_KEY_CFBundleDisplayName: "Colima Desktop"
        INFOPLIST_KEY_LSApplicationIsAgent: NO
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Colima Desktop contributors. Distributed under the project license."
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        INFOPLIST_FILE: packaging/Info.plist
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_NAME: "Colima Desktop"
        PRODUCT_MODULE_NAME: ColimaDesktop
        SWIFT_EMIT_LOC_STRINGS: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.0.0"
        CURRENT_PROJECT_VERSION: "1"

  # ─── Unit Tests (Swift Testing) ─────────────────────────
  ColimaDesktopUnitTests:
    templates:
      - UnitTestBundle
    sources:
      - Tests/Unit
      - Tests/Support
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colima.desktop.unit-tests

  # ─── Integration Tests (ViewInspector) ──────────────────
  ColimaDesktopIntegrationTests:
    templates:
      - UnitTestBundle
    sources:
      - Tests/Integration
      - Tests/Support
    dependencies:
      - package: ViewInspector
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colima.desktop.integration-tests

  # ─── Snapshot Tests ─────────────────────────────────────
  ColimaDesktopSnapshotTests:
    templates:
      - UnitTestBundle
    sources:
      - Tests/Snapshot
    dependencies:
      - package: SnapshotTesting
        product: SnapshotTesting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colima.desktop.snapshot-tests

  # ─── UI Tests (XCUITest — run in VM only) ───────────────
  ColimaDesktopUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - Tests/UI
    dependencies:
      - target: ColimaDesktop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.colima.desktop.ui-tests
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: ColimaDesktop

schemes:
  ColimaDesktop:
    build:
      targets:
        ColimaDesktopKit: all
        ColimaDesktop: all
        ColimaDesktopUnitTests: [test]
        ColimaDesktopIntegrationTests: [test]
        ColimaDesktopSnapshotTests: [test]
        ColimaDesktopUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      commandLineArguments:
        "--backend-mock": true
      targets:
        - ColimaDesktopUnitTests
        - ColimaDesktopIntegrationTests
        - ColimaDesktopSnapshotTests
        - ColimaDesktopUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
