name: Colima Desktop Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve SPM packages
        run: xcodebuild -resolvePackageDependencies -scheme ColimaDesktop -derivedDataPath build/DerivedData

      - name: Build
        run: xcodebuild build-for-testing -scheme ColimaDesktop -destination 'platform=macOS' -derivedDataPath build/DerivedData -quiet

      - name: Unit Tests
        run: |
          xcodebuild test -scheme ColimaDesktop -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            -only-testing:ColimaDesktopUnitTests \
            -resultBundlePath TestResults-Unit.xcresult

      - name: Integration Tests
        run: |
          xcodebuild test -scheme ColimaDesktop -destination 'platform=macOS' \
            -derivedDataPath build/DerivedData \
            -only-testing:ColimaDesktopIntegrationTests \
            -resultBundlePath TestResults-Integration.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults-*.xcresult
