name: explore-linux
# Pass 8: deterministic xdotool grid navigation — AT-SPI nav fully removed.
# Root cause (run 29643626991): AT-SPI component extents for ALL sidebar rows
# mapped to the same wrong coordinates (Dashboard row: 95,18). Strategies A/B/C
# matched rows by AT-SPI name then invoked those extents — even-indexed surfaces
# (Images=2, Networks=4, Kubernetes=6, Runtime=8, Profiles=10) each clicked
# Dashboard and recorded Dashboard content under a different label (mislabeled).
# Fix:
#   - Dashboard (index 0) = initial state, no click.
#   - Indices 1..10: ALL AT-SPI doAction/component-extent strategies bypassed.
#     Navigation is ONLY via xdotool positional grid:
#       abs_x = win_x + 100
#       abs_y = win_y + 23 + 38*i   (i = 0-based surface index)
#     activation_method = "xdotool_grid:index=N"
#   - Window origin: Stage A xdotool search + getwindowgeometry (dynamic);
#     Stage B fixed (0,0) Xvfb fallback.
#   - Validation: ALL 12 content fingerprints must be unique (new hard gate).

# Trigger on:
#   - manual dispatch
#   - pushes that touch the Linux app or the exploration scripts/workflow
on:
  workflow_dispatch:
  push:
    paths:
      - 'linux/**'
      - 'scripts/linux/**'
      - '.github/workflows/explore-linux.yml'
      - 'exploration/linux/**'

jobs:
  explore-linux-atspi:
    name: Linux AT-SPI2 ground-truth capture
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      # ── Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── System dependencies ─────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libadwaita-1-dev \
            protobuf-compiler \
            xvfb \
            dbus \
            dbus-x11 \
            at-spi2-core \
            at-spi2-doc \
            python3-pyatspi \
            python3-gi \
            gir1.2-atspi-2.0 \
            gir1.2-gtk-4.0 \
            scrot \
            imagemagick \
            x11-utils \
            xdotool \
            gsettings-desktop-schemas

      # ── Rust toolchain (pinned stable) ─────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # ── Cargo cache ─────────────────────────────────────────────────────
      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            linux/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('linux/Cargo.lock', 'linux/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── Build Linux GTK4 app (Release) ─────────────────────────────────
      - name: Build linux/colima-desktop (Release)
        working-directory: linux
        run: cargo build --release
        timeout-minutes: 15

      # ── Prepare output directory ────────────────────────────────────────
      - name: Prepare exploration output directory
        run: mkdir -p exploration/linux/screenshots

      # ── AT-SPI2 exploration ─────────────────────────────────────────────
      #
      # Session setup order (critical):
      #   1. Xvfb  — provides the DISPLAY
      #   2. dbus-daemon (via dbus-launch) — provides DBUS_SESSION_BUS_ADDRESS
      #   3. gsettings set toolkit-accessibility true — tells GTK4 to register ATs
      #   4. at-spi-bus-launcher --launch-immediately — starts the AT-SPI D-Bus
      #      registry; path is resolved at runtime to handle Ubuntu 22/24 both
      #   5. sleep 2 — allow AT-SPI bus to fully start
      #   6. colima shim — create /tmp/ci-colima-bin/colima and prepend to PATH
      #      so DependencyManager::is_colima_installed() returns true and the app
      #      shows the real main window (with sidebar) instead of the onboarding
      #      window. Without the shim all 11 captures are identical onboarding UIs.
      #   7. python3 explore_atspi.py — run with all env vars exported
      #
      # GTK4 accessibility env vars:
      #   GTK_A11Y=atspi     — select the AT-SPI backend explicitly. Valid values
      #                        in GTK4: accesskit | atspi | test | none | help.
      #                        Do NOT use GTK_A11Y=1 — "1" is unrecognized and
      #                        causes "Unrecognized accessibility backend '1'" which
      #                        silently kills AT-SPI registration.
      #   NO_AT_BRIDGE=0     — allow AT-SPI bridge (default 1 in headless envs blocks it)
      #   GTK_MODULES must NOT be set to gail:atk-bridge (GTK2/3 only, breaks GTK4)
      #
      # Pass 8 sidebar navigation (deterministic grid, AT-SPI nav removed):
      #   Run 29643626991 proved AT-SPI extents for all sidebar rows map to
      #   Dashboard coords (95,18), causing mislabeled captures on even-indexed
      #   surfaces. Fix: Dashboard = initial state (no click). Indices 1..11 use
      #   ONLY xdotool positional grid: abs_x = win_x+100, abs_y = win_y+23+38*i.
      #   activation_method = "xdotool_grid:index=N". All 12 content fps must be
      #   unique (hard gate — any duplicate = run fails).
      #
      # ALLOW_FAILURE: the explore step uses || true so the artifact upload
      # always runs. The final assertion step enforces the nonzero gate.
      - name: Run AT-SPI2 exploration
        id: explore
        timeout-minutes: 12
        run: |
          set -euo pipefail

          # ── 1. Start Xvfb ────────────────────────────────────────────
          Xvfb :99 -screen 0 1280x800x24 -ac +extension RANDR &
          XVFB_PID=$!
          export DISPLAY=:99
          sleep 1
          echo "[explore] Xvfb started (pid=$XVFB_PID, DISPLAY=$DISPLAY)"

          # ── 2. Start D-Bus session bus ────────────────────────────────
          eval "$(dbus-launch --sh-syntax)"
          export DBUS_SESSION_BUS_ADDRESS
          echo "[explore] D-Bus started: $DBUS_SESSION_BUS_ADDRESS"

          # ── 3. Enable toolkit-accessibility via gsettings ─────────────
          # GSETTINGS_BACKEND defaults to dconf; use memory backend since
          # no dconf daemon is running.  The key must be set BEFORE the app
          # starts so GTK4 reads it during gtk_init().
          export GSETTINGS_BACKEND=memory
          gsettings set org.gnome.desktop.interface toolkit-accessibility true 2>/dev/null || true
          echo "[explore] gsettings toolkit-accessibility=true (backend=memory)"

          # ── 4. Locate and start at-spi-bus-launcher ───────────────────
          # Ubuntu 22.04: /usr/lib/at-spi2-core/at-spi-bus-launcher
          # Ubuntu 24.04: /usr/lib/x86_64-linux-gnu/at-spi2-core/at-spi-bus-launcher
          # Also check PATH (some distros put it there)
          ATSPI_LAUNCHER=""
          for candidate in \
              "/usr/lib/at-spi2-core/at-spi-bus-launcher" \
              "/usr/lib/x86_64-linux-gnu/at-spi2-core/at-spi-bus-launcher" \
              "/usr/libexec/at-spi-bus-launcher" \
              "$(which at-spi-bus-launcher 2>/dev/null || true)"; do
            if [[ -x "$candidate" ]]; then
              ATSPI_LAUNCHER="$candidate"
              break
            fi
          done

          if [[ -z "$ATSPI_LAUNCHER" ]]; then
            echo "[explore] WARNING: at-spi-bus-launcher not found; trying at-spi2-registryd fallback"
            # at-spi2-registryd is an older launcher on some distros
            for candidate in \
                "$(which at-spi2-registryd 2>/dev/null || true)" \
                "/usr/lib/x86_64-linux-gnu/at-spi2-core/at-spi2-registryd"; do
              if [[ -x "$candidate" ]]; then
                ATSPI_LAUNCHER="$candidate"
                break
              fi
            done
          fi

          echo "[explore] AT-SPI launcher: ${ATSPI_LAUNCHER:-NOT FOUND}"
          find /usr/lib -name 'at-spi*' 2>/dev/null | sort || true

          if [[ -n "$ATSPI_LAUNCHER" ]]; then
            "$ATSPI_LAUNCHER" --launch-immediately &
            ATSPI_PID=$!
            echo "[explore] at-spi-bus-launcher started (pid=$ATSPI_PID)"
          else
            echo "[explore] WARNING: could not start at-spi-bus-launcher; AT-SPI registration may fail"
            ATSPI_PID=0
          fi

          # Give the AT-SPI bus time to fully register on D-Bus
          sleep 2

          # ── 5. Export GTK4 accessibility vars and run diagnostics ─────
          # GTK_A11Y=atspi is the correct GTK4 AT-SPI backend selector.
          # Setting GTK_A11Y=1 produces "Unrecognized accessibility backend '1'"
          # and prevents the app from registering in the AT-SPI tree.
          export GTK_A11Y=atspi
          export NO_AT_BRIDGE=0
          echo "[explore] GTK_A11Y=$GTK_A11Y NO_AT_BRIDGE=$NO_AT_BRIDGE"

          echo "--- AT-SPI accessible applications (before launch) ---"
          python3 - <<'PYEOF' || true
          import pyatspi
          try:
              desktop = pyatspi.Registry.getDesktop(0)
              print(f"Desktop childCount: {desktop.childCount}")
              for i in range(desktop.childCount):
                  app = desktop.getChildAtIndex(i)
                  print(f"  [{i}] name={app.name!r}")
          except Exception as e:
              print(f"  Error listing apps: {e}")
          PYEOF
          echo "------------------------------------------------------"

          # ── 6. Create colima shim and prepend to PATH ─────────────────
          # DependencyManager::is_colima_installed() uses which::which("colima").
          # Without a colima binary on PATH the app renders the onboarding window,
          # causing all 11 AT-SPI captures to be identical onboarding snapshots.
          # We install a CI-only shim that satisfies the presence check so the
          # app enters build_main_window() and renders the real sidebar UI.
          CI_COLIMA_BIN="/tmp/ci-colima-bin"
          mkdir -p "$CI_COLIMA_BIN"
          cp scripts/linux/colima_shim.sh "$CI_COLIMA_BIN/colima"
          chmod +x "$CI_COLIMA_BIN/colima"
          export PATH="$CI_COLIMA_BIN:$PATH"
          echo "[explore] colima shim: $CI_COLIMA_BIN/colima"
          echo "[explore] colima shim version: $($CI_COLIMA_BIN/colima --version | head -1)"
          echo "[explore] which colima: $(which colima)"

          # ── 7. Run exploration ────────────────────────────────────────
          # PATH already contains the colima shim; explore_atspi.py passes
          # os.environ to the app subprocess via build_app_env(), so the shim
          # is visible to which::which("colima") inside the Rust binary.
          EXIT_CODE=0
          python3 scripts/linux/explore_atspi.py \
            --app linux/target/release/colima-desktop \
            --outdir exploration/linux \
            --timeout 60 \
            --surface-pause 1.5 || EXIT_CODE=$?

          echo "[explore] Explorer exit code: $EXIT_CODE"

          # ── 8. Post-run diagnostics ────────────────────────────────────
          echo "--- AT-SPI accessible applications (after exploration) ---"
          python3 - <<'PYEOF' || true
          import pyatspi
          try:
              desktop = pyatspi.Registry.getDesktop(0)
              print(f"Desktop childCount: {desktop.childCount}")
              for i in range(desktop.childCount):
                  app = desktop.getChildAtIndex(i)
                  print(f"  [{i}] name={app.name!r}")
          except Exception as e:
              print(f"  Error: {e}")
          PYEOF
          echo "--- Process status ---"
          ps aux | grep -E 'at-spi|dbus|Xvfb|colima' | grep -v grep || true
          echo "------------------------------------------------------"

          # ── 9. Cleanup ────────────────────────────────────────────────
          [[ "$ATSPI_PID" -gt 0 ]] && kill "$ATSPI_PID" 2>/dev/null || true
          kill "$XVFB_PID" 2>/dev/null || true
          [[ -n "${DBUS_SESSION_BUS_PID:-}" ]] && kill "$DBUS_SESSION_BUS_PID" 2>/dev/null || true
          rm -rf "$CI_COLIMA_BIN"

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          # Exit 0 here so the artifact upload step always runs
          exit 0

      # ── Validate ground-truth.json (always) ────────────────────────────
      - name: Validate ground-truth.json
        run: |
          python3 - <<'PYEOF'
          import json, sys, pathlib

          gt_path = pathlib.Path("exploration/linux/ground-truth.json")
          if not gt_path.exists():
              print("ERROR: ground-truth.json not found", file=sys.stderr)
              sys.exit(1)

          try:
              data = json.loads(gt_path.read_text())
          except json.JSONDecodeError as e:
              print(f"ERROR: invalid JSON: {e}", file=sys.stderr)
              sys.exit(1)

          count = data.get("element_count", 0)
          blocked = data.get("environment_blocked", False)
          errs = data.get("errors", [])

          print(f"element_count  : {count}")
          print(f"surfaces_count : {data.get('surfaces_count', 'N/A')}")
          print(f"env_blocked    : {blocked}")
          print(f"errors         : {len(errs)}")
          for e in errs:
              print(f"  - [{e.get('phase','?')}] {e.get('error','?')}")

          if blocked:
              print("VALIDATION FAILED: environment_blocked=true", file=sys.stderr)
              sys.exit(1)

          if count == 0:
              print("VALIDATION FAILED: element_count=0", file=sys.stderr)
              sys.exit(1)

          surfaces = data.get("surfaces", [])
          nonempty = [s for s in surfaces if s.get("element_count", 0) > 0]
          print(f"nonempty_surfaces : {len(nonempty)}/{len(surfaces)}")

          if len(nonempty) < 12:
              print(f"VALIDATION FAILED: only {len(nonempty)}/12 nonempty surfaces", file=sys.stderr)
              sys.exit(1)

          print(f"VALIDATION PASSED: {count} elements, {len(nonempty)}/12 surfaces captured")
          PYEOF

      # ── Upload artifact (always — for diagnostics on failure too) ───────
      - name: Upload linux-ground-truth artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-ground-truth
          path: exploration/linux/
          if-no-files-found: warn
          retention-days: 30

      # ── Final gate: fail the job if exploration did not exit 0 ──────────
      - name: Assert exploration succeeded
        if: always()
        run: |
          EXIT_CODE="${{ steps.explore.outputs.exit_code }}"
          if [[ -z "$EXIT_CODE" ]]; then
            echo "ERROR: explore step did not emit an exit_code output."
            exit 1
          fi
          if [[ "$EXIT_CODE" != "0" ]]; then
            echo "AT-SPI exploration exited with code $EXIT_CODE."
            echo "Review the 'linux-ground-truth' artifact and the step log above."
            exit "$EXIT_CODE"
          fi
          echo "Exploration succeeded."
