name: explore-windows

on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable extra debug output'
        required: false
        default: 'false'
  push:
    paths:
      - 'windows/**'
      - 'scripts/windows/**'
      - '.github/workflows/explore-windows.yml'
      - 'exploration/windows/**'

jobs:
  explore:
    name: Windows UIAutomation Ground-Truth Capture
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. .NET SDK ──────────────────────────────────────────────────────
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ── 3. Build app (unpackaged, WindowsAppSDK self-contained) ──────────
      # WindowsAppSDKSelfContained=true embeds the WinAppSDK framework DLLs
      # directly in the output directory so the app never calls Bootstrap::
      # Initialize against installed packages at runtime.  This eliminates
      # the "This application could not be started" OS error dialog that
      # appears when the WinAppSDK runtime installer fails on CI.
      # (SelfContained=true bundles .NET runtime; WindowsAppSDKSelfContained
      #  is a separate, WinUI-specific property that bundles the AppSDK DLLs.)
      - name: Restore app NuGet packages
        working-directory: windows
        run: |
          # Pass -r win-x64 so NuGet resolves RID-specific assets that match the
          # subsequent publish command; avoids the "assets generated for different
          # RID" MSBuild warning that can re-trigger AnyCPU target evaluation.
          # -p:Platform=x64 sets the MSBuild $(Platform) property explicitly —
          # RuntimeIdentifier/PlatformTarget/Platforms alone do NOT override it,
          # and WindowsAppSDK SelfContained resolution gates on $(Platform).
          dotnet restore ColimaDesktop.Windows.csproj `
            -r win-x64 `
            -p:Platform=x64 `
            -p:PlatformTarget=x64
        timeout-minutes: 5

      - name: Build app (unpackaged, WinAppSDK self-contained)
        working-directory: windows
        run: |
          dotnet publish ColimaDesktop.Windows.csproj `
            -c Release `
            -r win-x64 `
            -p:Platform=x64 `
            -p:PlatformTarget=x64 `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=true `
            -p:SelfContained=true `
            -p:PublishSingleFile=false `
            -o "$env:GITHUB_WORKSPACE\app-out"
        timeout-minutes: 10

      - name: Verify app binary exists
        shell: pwsh
        run: |
          $dir = "$env:GITHUB_WORKSPACE\app-out"
          $exe = "$dir\ColimaDesktop.Windows.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "App binary not found at: $exe"
            Write-Host "Contents of $dir :"
            Get-ChildItem $dir | Select-Object Name, Length | Format-Table -AutoSize
            exit 1
          }
          $size = (Get-Item $exe).Length
          Write-Host "App binary: $exe  ($size bytes)"
          # Sanity: a WinAppSDK self-contained publish is large (>30 MB total dir)
          $total = (Get-ChildItem $dir -Recurse | Measure-Object -Property Length -Sum).Sum
          Write-Host "Output dir total size: $([math]::Round($total/1MB,1)) MB"
          # Log presence of bootstrap DLL — its absence is the original root cause
          $bootstrap = Join-Path $dir "Microsoft.WindowsAppRuntime.Bootstrap.dll"
          if (Test-Path $bootstrap) {
            Write-Host "Bootstrap DLL present: $bootstrap"
          } else {
            Write-Warning "Bootstrap DLL NOT found — self-contained embed may have failed"
          }

      # ── 4. Build FlaUI explorer ──────────────────────────────────────────
      - name: Restore explorer NuGet packages
        working-directory: scripts/windows
        run: dotnet restore explore-uia.csproj
        timeout-minutes: 5

      - name: Build FlaUI explorer
        working-directory: scripts/windows
        run: |
          dotnet publish explore-uia.csproj `
            -c Release `
            -r win-x64 `
            -p:SelfContained=true `
            -p:PublishSingleFile=false `
            -o "$env:GITHUB_WORKSPACE\explorer-out"
        timeout-minutes: 5

      # ── 5. Prepare output directories ────────────────────────────────────
      - name: Create output directories
        run: |
          New-Item -ItemType Directory -Force -Path "exploration\windows\screenshots" | Out-Null
          Write-Host "Output dirs created."

      # ── 6. Launch app + run UIAutomation explorer ─────────────────────────
      # The explorer binary handles app launch, OS-dialog detection, navigation,
      # element capture, and screenshot saving internally.  It exits 0 on success.
      - name: Run UIAutomation exploration
        shell: pwsh
        run: |
          $appExe      = "$env:GITHUB_WORKSPACE\app-out\ColimaDesktop.Windows.exe"
          $explorerExe = "$env:GITHUB_WORKSPACE\explorer-out\explore-uia.exe"
          $outputJson  = "$env:GITHUB_WORKSPACE\exploration\windows\ground-truth.json"
          $screensDir  = "$env:GITHUB_WORKSPACE\exploration\windows\screenshots"

          Write-Host "App:      $appExe"
          Write-Host "Explorer: $explorerExe"
          Write-Host "Output:   $outputJson"

          # Collect Event Log Application errors from before launch for later delta
          $beforeErrors = @(Get-EventLog -LogName Application -EntryType Error `
            -Newest 20 -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Message)

          # Run explorer (it launches the app internally)
          $proc = Start-Process `
            -FilePath $explorerExe `
            -ArgumentList "`"$appExe`"", "`"$outputJson`"", "`"$screensDir`"" `
            -PassThru -Wait -NoNewWindow
          $code = $proc.ExitCode
          Write-Host "Explorer exit code: $code"

          if ($code -ne 0) {
            Write-Host ""
            Write-Host "=== POST-FAILURE DIAGNOSTICS ==="
            # New Application Event Log errors since we started
            $afterErrors = @(Get-EventLog -LogName Application -EntryType Error `
              -Newest 30 -ErrorAction SilentlyContinue)
            $newErrors = $afterErrors | Where-Object {
              $beforeErrors -notcontains $_.Message
            }
            if ($newErrors) {
              Write-Host "New Application Event Log errors:"
              foreach ($ev in $newErrors) {
                Write-Host "  [$($ev.Source)] $($ev.Message.Substring(0, [Math]::Min(300,$ev.Message.Length)))"
              }
            } else {
              Write-Host "No new Application Event Log errors."
            }
            # List running processes named ColimaDesktop
            $procs = Get-Process -Name "ColimaDesktop*" -ErrorAction SilentlyContinue
            if ($procs) {
              Write-Host "Lingering ColimaDesktop processes: $($procs | Select-Object -ExpandProperty Id)"
              $procs | Stop-Process -Force -ErrorAction SilentlyContinue
            }
          }

          exit $code
        timeout-minutes: 25

      # ── 7. Validate JSON ──────────────────────────────────────────────────
      - name: Validate ground-truth.json
        shell: pwsh
        run: |
          pwsh scripts/windows/validate-ground-truth.ps1 `
            exploration/windows/ground-truth.json
        timeout-minutes: 2

      # ── 8. Print summary ──────────────────────────────────────────────────
      - name: Print capture summary
        if: always()
        shell: pwsh
        run: |
          $jsonPath = "exploration\windows\ground-truth.json"
          if (Test-Path $jsonPath) {
            $doc = Get-Content $jsonPath -Raw | ConvertFrom-Json -Depth 10
            Write-Host "=== Windows Ground-Truth Summary ==="
            Write-Host "Platform:          $($doc.platform)"
            Write-Host "Timestamp:         $($doc.timestamp)"
            Write-Host "Total elements:    $($doc.total_elements)"
            Write-Host "Surfaces explored: $($doc.surfaces_explored)"
            if ($doc.surfaces) {
              foreach ($s in $doc.surfaces) {
                $flag = if ([int]$s.element_count -gt 0) { "OK" } else { "MISS" }
                Write-Host "  [$flag] $($s.surface_label): $($s.element_count) elements"
              }
            }
            if ($doc.capture_errors -and $doc.capture_errors.Count -gt 0) {
              Write-Host "Capture errors:"
              foreach ($e in $doc.capture_errors) { Write-Host "  - $e" }
            }
          } else {
            Write-Host "ground-truth.json not found — capture likely failed."
          }
          # List screenshots
          $shots = Get-ChildItem "exploration\windows\screenshots" -Filter "*.png" -ErrorAction SilentlyContinue
          Write-Host "Screenshots: $($shots.Count) files"

      # ── 9. Upload artifact (always — even on failure for diagnostics) ─────
      - name: Upload windows-ground-truth artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: windows-ground-truth
          path: |
            exploration/windows/ground-truth.json
            exploration/windows/screenshots/
          retention-days: 30
          if-no-files-found: warn
